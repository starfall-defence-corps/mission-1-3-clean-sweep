    #       Add 'notify: Apply sysctl' to trigger the handler

    # ----------------------------------------------------------
    # Task 6: Fix /etc/shadow permissions
    # ----------------------------------------------------------
    # /etc/shadow stores password hashes. It should NOT be
    # world-readable. Set permissions to 0640 (owner: root,
    # group: shadow).
    #
    # Module: ansible.builtin.file
    # Key parameters: path, owner, group, mode
