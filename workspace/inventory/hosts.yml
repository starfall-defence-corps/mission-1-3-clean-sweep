          ansible_ssh_private_key_file: .ssh/cadet_key
    db_servers:
      hosts:
        sdc-db:
          ansible_host: localhost
          ansible_port: 2222
          ansible_user: cadet
          ansible_ssh_private_key_file: .ssh/cadet_key
    comms_relays:
      hosts:
        sdc-comms:
          ansible_host: localhost
          ansible_port: 2223
          ansible_user: cadet
          ansible_ssh_private_key_file: .ssh/cadet_key
